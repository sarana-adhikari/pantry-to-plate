<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pantry to Plate AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🍳 Pantry to Plate</h1>
        <p>Enter your ingredients separated by commas:</p>
        <input type="text" id="ingredientsInput" placeholder="chicken, garlic, rice...">
        <button id="generateBtn">Generate Recipe</button>
        
        <div id="loading" class="hidden">
            <div class="spinner">🍳</div>
            <div id="thought-process">Waking up the chef...</div>
        </div>
        
        <div id="recipeOutput"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
