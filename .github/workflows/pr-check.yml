name: Pull Request Checks

# Only run when a PR is opened against the main branch
on:
  pull_request:
    branches:
      - main

jobs:
  validate-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Lint the Python Code (Catches syntax errors before deployment)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Check Python Syntax
        run: |
          python -m py_compile src/app.py

      # 2. Terraform Plan (Shows what WILL happen without actually doing it)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: ./infra
        run: terraform init

      - name: Terraform Plan
        working-directory: ./infra
        env:
          TF_VAR_gemini_key: ${{ secrets.GEMINI_API_KEY }}
        run: terraform plan