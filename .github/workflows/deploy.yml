---
name: Pantry-to-Plate CI/CD Pipeline
# This workflow runs when there is a push to main
"on":
  push:
    branches: [main]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Run terminal commands inside the infra/ folder by default
    defaults:
      run:
        working-directory: ./infra
    steps:
      # 1. Download your code from the repository onto the GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Log into AWS using the secrets you provided
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Install Terraform on the GitHub runner
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 4. Initialize Terraform (downloads the AWS provider)
      - name: Terraform Init
        run: terraform init

      # 5. Apply the infrastructure.
      # -auto-approve skips the "yes" prompt.
      # The 'env' block securely passes your Gemini key so main.tf can use it.
      - name: Terraform Apply
        env:
          TF_VAR_gemini_key: ${{ secrets.GEMINI_API_KEY }}
        run: terraform apply -auto-approve

      # 6. Deploy the Frontend
      - name: Sync S3 and Invalidate CloudFront
        run: |
          # Dynamically grab the exact resource names from Terraform outputs
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)

          # Upload the frontend files
          aws s3 sync ../frontend s3://$S3_BUCKET

          # Clear the CloudFront cache
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*"
