---
name: Deploy to Production

"on":
  workflow_run:
    workflows: ["Integration Tests"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Log into AWS using the secrets you provided
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 2. Install Terraform on the GitHub runner
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Initialize Terraform (downloads the AWS provider)
      - name: Terraform Init
        run: terraform init

      # 4. Apply the infrastructure.
      # -auto-approve skips the "yes" prompt.
      # The 'env' block securely passes your Gemini key so main.tf can use it.
      - name: Terraform Apply
        env:
          TF_VAR_gemini_key: ${{ secrets.GEMINI_API_KEY }}
        run: terraform apply -auto-approve

      # 5. Deploy the Frontend
      - name: Sync S3 and Invalidate CloudFront
        run: |
          # Dynamically grab the exact resource names from Terraform outputs
          S3_BUCKET=$(terraform output -raw s3_bucket_name)
          CF_ID=$(terraform output -raw cloudfront_distribution_id)

          # Upload the frontend files
          aws s3 sync ../frontend s3://$S3_BUCKET

          # Clear the CloudFront cache
          aws cloudfront create-invalidation \
            --distribution-id "$CF_ID" \
            --paths "/*"
