name: Integration Tests

"on":
  push:
    branches: [main]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run Unit Tests
        run: python -m pytest src/test_app.py -v
      - name: Run Integration Tests
        run: python -m pytest src/test_integration.py -v
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}